.price-btn{padding:12px 8px;border:1px solid var(--bor);border-radius:8px;font-size:14px;text-align:center;cursor:pointer;background:#fff;font-family:inherit;}

.pm-btn{width:28px;height:28px;border:1px solid var(--bor);border-radius:6px;background:#fff;cursor:pointer;font-size:16px;font-weight:700;color:var(--txt2);display:flex;align-items:center;justify-content:center;}
.pm-btn:hover{border-color:var(--pri);color:var(--pri);}
.region-cols{display:flex;gap:6px;}
.region-col{flex:1;max-height:260px;overflow-y:auto;border:1px solid var(--bor);border-radius:8px;}
.region-col-title{font-size:11px;font-weight:600;color:var(--txt2);padding:6px 8px;background:var(--inp);position:sticky;top:0;}
.region-item{padding:9px 14px;font-size:14px;cursor:pointer;}
.region-item:hover{background:var(--inp);}
.region-item.sel{background:var(--pri-l);color:var(--pri);font-weight:600;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.type-btn{padding:10px 8px;border:1px solid var(--bor);border-radius:8px;font-size:14px;text-align:center;cursor:pointer;background:#fff;font-family:inherit;}
.type-btn:hover{border-color:var(--pri);color:var(--pri);}
.type-btn.sel{background:var(--pri);color:#fff;border-color:var(--pri);}
.count-btns{display:flex;flex-wrap:wrap;gap:4px;}

tbody td{padding:10px 12px;border-bottom:1px solid #f1f5f9;text-align:center;}

.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
.b-sell{background:#dbeafe;color:#1d4ed8;}.b-jeon{background:#d1fae5;color:#065f46;}.b-wol{background:#fef3c7;color:#92400e;}
.type-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:#f1f5f9;color:#475569;}
.price-cell{font-weight:700;white-space:nowrap;}

.feature-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2);font-size:12.5px;text-align:left;}
.pagination{max-width:1400px;margin:0 auto;padding:10px 16px 80px;display:flex;justify-content:center;gap:4px;}
.pg-btn{padding:6px 11px;border:1px solid var(--bor);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;}
.pg-btn:hover{background:var(--inp);}
.pg-btn.active{background:var(--pri);color:#fff;border-color:var(--pri);}
.welcome{text-align:center;padding:80px 20px;color:var(--txt2);}
.welcome .big{font-size:48px;margin-bottom:12px;}
.empty{text-align:center;padding:60px 20px;color:var(--txt2);display:none;}
.empty .big{font-size:40px;margin-bottom:8px;opacity:.5;}
.loading-bar{display:none;text-align:center;padding:40px;color:var(--txt2);}

  .f-apply { padding-top: 12px !important; }
  .btn-sm { padding: 10px 20px !important; font-size: 14px !important; }

  body { font-size: 14px; }

</style>

function fmtUk(v){return v>=10000?(v/10000)+"억":(v/1000)+"천";}
var prSt=0;
function clickPr(v){
  var grid=document.getElementById("priceGrid");
  if(prSt===0){
    document.getElementById("pr_min").value=v;
    document.getElementById("pr_max").value="";
    prSt=1;
    grid.querySelectorAll(".price-btn").forEach(function(b){b.classList.remove("sel");b.classList.remove("sel-range");});
    grid.querySelectorAll(".price-btn").forEach(function(b){if(b.textContent===fmtUk(v))b.classList.add("sel");});
  } else {
    var minV=parseInt(document.getElementById("pr_min").value)||0;
    if(v<minV){document.getElementById("pr_min").value=v;document.getElementById("pr_max").value=minV;}
    else{document.getElementById("pr_max").value=v;}
    prSt=0;
    var finalMin=parseInt(document.getElementById("pr_min").value)||0;
    var finalMax=parseInt(document.getElementById("pr_max").value)||0;
    highlightPriceRange(finalMin,finalMax);
  }
}
function highlightPriceRange(minV,maxV){
  var vals=[10000,20000,30000,40000,50000,60000,70000,80000,90000,100000,110000,120000,130000,150000,170000,200000,230000,250000];
  var grid=document.getElementById("priceGrid");
  grid.querySelectorAll(".price-btn").forEach(function(b,i){
    b.classList.remove("sel");b.classList.remove("sel-range");
    var bv=vals[i];
    if(bv===minV||bv===maxV)b.classList.add("sel");
    else if(bv>minV&&bv<maxV)b.classList.add("sel-range");
  });
}
function applyPrice(){F.pmin=document.getElementById("pr_min").value;F.pmax=document.getElementById("pr_max").value;var l="가격대";if(F.pmin&&F.pmax)l=fmtUk(+F.pmin)+"~"+fmtUk(+F.pmax);else if(F.pmin)l=fmtUk(+F.pmin)+"이상";else if(F.pmax)l=fmtUk(+F.pmax)+"이하";updChip("price",l);closeP("price");if(searched)doSearch(1);}
function resetPrice(){document.getElementById("pr_min").value="";document.getElementById("pr_max").value="";F.pmin="";F.pmax="";updChip("price","가격대");prSt=0;document.getElementById("priceGrid").querySelectorAll(".price-btn").forEach(function(b){b.classList.remove("sel");b.classList.remove("sel-range");});}

// ===== 사용승인일 (1년 단위 슬라이더) =====
function buildYearPanel(){
  var p=document.getElementById("panel-year");p.style.minWidth="380px";p.innerHTML="";
  addTitle(p,"사용승인일","year");
  // 슬라이더 라벨
  var label=document.createElement("div");
  label.id="yearLabel";label.style.cssText="text-align:center;font-size:15px;font-weight:700;color:var(--grn);margin:8px 0 4px;";
  label.textContent="전체";p.appendChild(label);
  // 슬라이더
  var sw=document.createElement("div");sw.className="slider-wrap";
  var slider=document.createElement("input");slider.type="range";slider.id="yearSlider";
  slider.min="0";slider.max="30";slider.value="0";slider.step="1";
  slider.oninput=function(){
    var v=parseInt(this.value);
    F.yearMax=v>0?String(v):"";
    document.getElementById("yearLabel").textContent=v>0?"~"+v+"년":"전체";
    // 슬라이더 배경 채우기
    var pct=(v/30)*100;
    this.style.background="linear-gradient(to right,var(--grn) "+pct+"%,#e2e8f0 "+pct+"%)";
    highlightYearBtns();
  };
  sw.appendChild(slider);p.appendChild(sw);
  // 버튼 그리드 (4열)
  var grid=document.createElement("div");grid.className="year-grid";grid.id="yearBtns";
  var yearData=[
    {l:"입주예정",v:0},{l:"2년",v:2},{l:"4년",v:4},{l:"10년",v:10},
    {l:"15년",v:15},{l:"20년",v:20},{l:"25년",v:25},{l:"30년",v:30}
  ];
  yearData.forEach(function(o,i){
    var btn=document.createElement("div");
    btn.className="year-btn"+(i===0?" sel":"");
    btn.textContent=o.l;
    btn.onclick=function(e){
      e.stopPropagation();
      F.yearMax=o.v>0?String(o.v):"";
      var sl=document.getElementById("yearSlider");
      sl.value=o.v;
      var pct=(o.v/30)*100;
      sl.style.background="linear-gradient(to right,var(--grn) "+pct+"%,#e2e8f0 "+pct+"%)";
      document.getElementById("yearLabel").textContent=o.v>0?"~"+o.v+"년":"전체";
      highlightYearBtns();
    };
    grid.appendChild(btn);
  });
  p.appendChild(grid);
  addApply(p,function(){
    F.yearMax="";
    var sl=document.getElementById("yearSlider");sl.value=0;
    sl.style.background="linear-gradient(to right,var(--grn) 0%,#e2e8f0 0%)";
    document.getElementById("yearLabel").textContent="전체";
    highlightYearBtns();
    updChip("year","사용승인일");
  },function(){
    updChip("year",F.yearMax?"~"+F.yearMax+"년":"사용승인일");
    closeP("year");if(searched)doSearch(1);
  });
}
function buildFacPanel(){
  var p=document.getElementById("panel-fac");p.innerHTML="";
  addTitle(p,"시설옵션 (중복선택)","fac");
  var g=document.createElement("div");g.className="type-grid";g.id="facGrid";p.appendChild(g);
  var FAC_LIST=["신축","역세권","테라스","주차","급매","즉시입주","복층","특가","마당","풀옵션","엘리베이터","CCTV","베란다"];
  FAC_LIST.forEach(function(f){
    var btn=document.createElement("div");btn.className="type-btn"+(F.facs.indexOf(f)>=0?" sel":"");btn.textContent=f;
    btn.onclick=function(e){e.stopPropagation();var idx=F.facs.indexOf(f);if(idx>=0){F.facs.splice(idx,1);btn.classList.remove("sel");}else{F.facs.push(f);btn.classList.add("sel");}};
    g.appendChild(btn);
  });
  addApply(p,function(){F.facs=[];buildFacPanel();updChip("fac","시설옵션");},function(){updChip("fac",F.facs.length?F.facs.join(","):"시설옵션");closeP("fac");if(searched)doSearch(1);});
}
function highlightYearBtns(){
  var v=parseInt(F.yearMax)||0;
  var yearVals=[0,2,4,10,15,20,25,30];
  document.querySelectorAll("#yearBtns .year-btn").forEach(function(btn,i){
    btn.classList.toggle("sel",yearVals[i]===v);
  });
}

function addApply(parent,resetFn,applyFn){

// ===== 검색 =====
function doSearch(page){
  cp=page;searched=true;
  document.getElementById("welcomeState").style.display="none";
  document.getElementById("resultBar").style.display="flex";
  document.getElementById("loadingBar").classList.add("on");
  document.getElementById("resultTable").style.display="none";
  document.getElementById("emptyState").style.display="none";
  document.getElementById("pagination").innerHTML="";

  var params=new URLSearchParams();
  params.set("page","1");params.set("size","100000");
  if(F.trade)params.set("trade_type",F.trade);
  // type 필터는 프론트에서 type_normalized로 처리
  if(F.rl)params.set("region_large",F.rl);
  if(F.rm)params.set("region_mid",F.rm);
  if(F.rs)params.set("region_small",F.rs);
  if(F.pmin)params.set("price_min",F.pmin);
  if(F.pmax)params.set("price_max",F.pmax);
  var kwEl=document.getElementById("s_keyword");var kw=kwEl?kwEl.value.trim():(F.search||"");
  if(kw)params.set("search",kw);

  var fetchUrl=API+"?"+params.toString();fetch(fetchUrl,{cache:'no-store',headers:_diaHeaders()}).then(function(r){if(r.status===401){alert('로그인이 필요합니다');location.href='login.html';return Promise.reject('unauth');}if(!r.ok){throw new Error("HTTP "+r.status);}return r.json();}).then(function(data){
    document.getElementById("loadingBar").classList.remove("on");
    allItems=data.items||[];
    // 매물유형 다중 필터 (서버에서 1개만 지원하므로 클라이언트에서 추가 필터)
    if(F.types.length>0){allItems=allItems.filter(function(item){return F.types.indexOf(item.type_normalized)>=0||F.types.indexOf(item.type_name)>=0;});}
    // 시설옵션 필터
    if(F.facs.length>0){allItems=allItems.filter(function(item){var ft=(item.feature||"")+(item.facilities||"");return F.facs.every(function(fac){return ft.indexOf(fac)>=0;});});}
    // 중복 제거 (같은 주소+금액+면적)
    var before=allItems.length;
    // 같은 동+번지+금액+면적 중 최신 매물만 유지
    var groups={};
    allItems.forEach(function(item){
      var addr=item.address||"";
      var m=addr.match(/(\d+-\d+)/);
      var bunji=m?m[1]:"";
      var dong=item.region_small||"";
      var key=dong+"_"+bunji+"_"+(item.price||0)+"_"+(item.net_area||0);
      if(!groups[key]){groups[key]=item;}
      else{
        var curId=parseInt(item.naver_id)||0;
        var prevId=parseInt(groups[key].naver_id)||0;
        if(curId>prevId)groups[key]=item;
      }
    });
    allItems=Object.values(groups);
    // 방 개수 필터 (feature에서 파싱)
    if(F.rooms){
      var rn=parseInt(F.rooms)||99;
      allItems=allItems.filter(function(item){
        var cnt=0;
        if(item.room_count){cnt=parseInt(item.room_count)||0;}
        else{var ft=(item.feature||"")+(item.address||"");var rm=ft.match(/방(\d)/)||ft.match(/(\d)룸/)||ft.match(/(\d)room/i);if(rm)cnt=parseInt(rm[1]);}
        if(!cnt)return F.roomMode==="gte";
        return F.roomMode==="gte"?cnt>=rn:cnt===rn;
      });
    }
    // 욕실 개수 필터
    if(F.baths){
      var bn=parseInt(F.baths)||99;
      allItems=allItems.filter(function(item){
        var cnt=0;
        if(item.bath_count){cnt=parseInt(item.bath_count)||0;}
        else{var ft=(item.feature||"")+(item.address||"");var bm=ft.match(/화(\d)/)||ft.match(/욕실(\d)/)||ft.match(/화장실(\d)/);if(bm)cnt=parseInt(bm[1]);}
        if(!cnt)return F.bathMode==="gte";
        return F.bathMode==="gte"?cnt>=bn:cnt===bn;
      });
    }
    // 가격 필터 (프론트)
    if(F.pmin||F.pmax){
      var pmin=F.pmin?parseInt(F.pmin):0;
      var pmax=F.pmax?parseInt(F.pmax):999999999;
      allItems=allItems.filter(function(item){
        var p=item.price||0;
        if(item.trade_type==="월세")p=item.deposit||0;
        return p>=pmin&&p<=pmax;
      });
    }
    // 면적 필터 (프론트)
    if(F.amin||F.amax){
      var amin=F.amin?parseFloat(F.amin):0;
      var amax=F.amax?parseFloat(F.amax):999999;
      allItems=allItems.filter(function(item){
        var a=item.net_area||item.total_area||0;
        return a>=amin&&a<=amax;
      });
    }
    // 사용승인일 필터 (프론트) - 경과 연수 기준
    if(F.yearMax){
      var maxAge=parseInt(F.yearMax);
      var thisYear=new Date().getFullYear();
      allItems=allItems.filter(function(item){
        var ad=item.approval_date||"";
        if(!ad)return false;
        var y=parseInt(ad.substring(0,4))||0;
        if(y<1900)return false;
        var age=thisYear-y;
        return age<=maxAge;
      });
    }
    dedupCount=before-allItems.length;
    document.getElementById("totalCount").textContent=allItems.length.toLocaleString();
    document.getElementById("dedupInfo").textContent=dedupCount>0?"(중복 "+dedupCount+"건 제외)":"";
    if(!allItems.length){document.getElementById("emptyState").style.display="block";return;}
    sortCol="";sortDir="asc";
    renderItems();
  }).catch(function(err){
    document.getElementById("loadingBar").classList.remove("on");
    document.getElementById("emptyState").style.display="block";
  });
}

function renderItems(){
  try{
  var items=allItems.slice();
  // 정렬
  if(sortCol){
    items.sort(function(a,b){
      var va=a[sortCol],vb=b[sortCol];
      if(typeof va==="number"&&typeof vb==="number")return sortDir==="asc"?va-vb:vb-va;
      va=String(va||"");vb=String(vb||"");
      return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va);
    });
  }
  // 페이징
  var tp=Math.ceil(items.length/PS);
  var start=(cp-1)*PS,end=start+PS;
  var pageItems=items.slice(start,end);
  document.getElementById("pageInfo").textContent=cp+" / "+tp+" 페이지";
  document.getElementById("resultTable").style.display="table";

  var tbody=document.getElementById("resultBody");tbody.innerHTML="";
  pageItems.forEach(function(item,i){
    var tr=document.createElement("tr");
    var nid=item.naver_id||"";
    tr.onclick=function(){showDetail(item);};
    var tc=item.trade_type==="매매"?"b-sell":item.trade_type==="전세"?"b-jeon":"b-wol";
    var n=start+i+1;
    var addrFull = (item.address||"");
    var bldName = item.building_name||"";
    var area = item.net_area ? item.net_area+"\u33A1" : "";
    var roomInfo = "";
    if(item.room_count){roomInfo="방"+item.room_count;if(item.bath_count)roomInfo+=" 욕"+item.bath_count;}
    else{var ft=(item.feature||"")+(item.address||"");var rmMatch=ft.match(/(\d)룸/)||ft.match(/(\d)room/i)||ft.match(/방(\d)/)||ft.match(/(\d)방/);var btMatch=ft.match(/화(\d)/)||ft.match(/욕실(\d)/)||ft.match(/화장실(\d)/);if(rmMatch)roomInfo+="방"+rmMatch[1];if(btMatch)roomInfo+=" 욕"+btMatch[1];}
    if(roomInfo) roomInfo = "<span style='color:#10b981;font-size:10px;'>"+roomInfo+"</span>";
    var areaInfo = area ? "<span style='color:#888;font-size:10px;'>"+area+"</span>" : "";
    var subInfo = [areaInfo, roomInfo].filter(function(x){return x;}).join(" ");
    tr.innerHTML="<td>"+n+"</td><td style='font-size:11px;'>"+(item.trade_type||"-")+"<br><span style='color:#888;font-size:10px;'>"+(item.type_normalized||"")+"</span></td><td class='addr-cell' style='text-align:left;white-space:normal;'><div style='font-size:12px;font-weight:600;color:#2563eb;'>"+bldName+"</div><div style='font-size:11px;color:#ccc;'>"+addrFull+"</div></td><td style='text-align:right;white-space:nowrap;'><div class='price-cell'>"+fmtPr(item)+"</div><div>"+subInfo+"</div></td>";
    tbody.appendChild(tr);
  });
  renderPg(cp,tp);
  }catch(e){alert("렌더링오류: "+e.message);}
}

function fmtPr(item){var p=item.price||0;if(item.trade_type==="월세")return fmtM(item.deposit||0)+"/"+fmtM(item.monthly_rent||0);return fmtM(p);}
function fmtM(v){if(!v)return"-";if(v>=10000){var u=Math.floor(v/10000),r=v%10000;return r>0?u+"억"+r.toLocaleString():u+"억";}return v.toLocaleString()+"만";}

function renderPg(cur,total){
  var div=document.getElementById("pagination");div.innerHTML="";
  if(total<=1)return;
  function addBtn(text,page,active){var btn=document.createElement("button");btn.className="pg-btn"+(active?" active":"");btn.textContent=text;btn.onclick=function(){cp=page;renderItems();};div.appendChild(btn);}
  if(cur>1){addBtn("«",1);addBtn("‹",cur-1);}
  var s=Math.max(1,cur-4),e=Math.min(total,s+9);if(e-s<9)s=Math.max(1,e-9);
  for(var i=s;i<=e;i++)addBtn(i,i,i===cur);
  if(cur<total){addBtn("›",cur+1);addBtn("»",total);}
}

function resetAll(){
  F={trade:"",types:[],rl:"",rm:"",rs:"",pmin:"",pmax:"",amin:"",amax:"",rooms:"",roomMode:"exact",baths:"",bathMode:"exact",yearMax:"",facs:[],search:""};
  var _kw=document.getElementById("s_keyword"); if(_kw)_kw.value="";
  ["search","trade","price","region","type","room","area","year","fac"].forEach(function(n){

    updChip(n,defs[n]);
  });
  allItems=[];sortCol="";sortDir="asc";searched=false;

}

// ===== 매물 상세 모달 =====
function showDetail(item) {
  var tc = item.trade_type==='매매' ? 'b-sell' : item.trade_type==='전세' ? 'b-jeon' : 'b-wol';
  var priceText = fmtPr(item);
  var nid = item.naver_id || '';
  var memo = item.private_memo || '';
  var photoUrls = [];
  try { if(item.photo_urls) photoUrls = JSON.parse(item.photo_urls); } catch(e){}

  var el = document.createElement('div');
  el.id = 'detail-modal';
  el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  el.onclick = function(e){ if(e.target===el) el.remove(); };

  var box = '<div style="background:#fff;border-radius:16px;padding:24px;max-width:480px;width:92%;box-shadow:0 10px 40px rgba(0,0,0,.3);max-height:92vh;overflow-y:auto;">';
  box += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><span style="font-size:17px;font-weight:800;">매물 상세</span><button id="dm-close" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:0 4px;">✕</button></div>';
  box += '<div style="display:flex;gap:8px;margin-bottom:10px;"><span class="badge '+tc+'" style="font-size:12px;padding:4px 10px;">'+(item.trade_type||'-')+'</span><span style="font-size:12px;padding:4px 10px;background:#f1f5f9;border-radius:6px;">'+(item.type_normalized||'-')+'</span></div>';
  box += '<div style="font-size:24px;font-weight:900;color:#1e293b;margin-bottom:12px;">'+priceText+'</div>';

  // 매물 정보 테이블
  box += '<table style="display:table;width:100%;font-size:13px;border-collapse:collapse;margin-bottom:14px;">';
  var rows = [
    ['소재지', item.address||'-'],
    ['전용/공급', (item.net_area||'-')+'㎡ / '+(item.supply_area||item.total_area||'-')+'㎡'],
    ['특징', item.feature||'-'],
    ['담당', item.sub_account_name||'-']
  ];
  rows.forEach(function(r){
    box += '<tr><td style="padding:6px 10px;font-weight:600;color:#64748b;white-space:nowrap;border-bottom:1px solid #f1f5f9;width:65px;">'+r[0]+'</td><td style="padding:6px 10px;border-bottom:1px solid #f1f5f9;">'+r[1]+'</td></tr>';
  });
  box += '</table>';

  // 버튼: 네이버 + 브리핑시트
  box += '<div style="display:flex;gap:10px;margin-bottom:14px;">';
  if(nid) box += '<button id="dm-naver" style="flex:1;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">🏠 네이버부동산</button>';
  box += '<button id="dm-briefing" style="flex:1;padding:13px;background:linear-gradient(135deg,#bf953f,#d4a84b);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">📋 브리핑시트</button>';
  box += '</div>';

  // 비공개 메모 — 길면 탭하여 모달로 전체보기 (2026-05-19)
  box += '<div style="background:#f8f9fa;border:1px solid #e2e8f0;border-radius:10px;padding:14px;">';
  box += '<div style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:8px;">🔒 비공개 메모</div>';
  if(memo) {
    var safeMemo = memo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var memoLines = safeMemo.split('\n').length;
    var memoLong = safeMemo.length > 180 || memoLines > 5;
    if (memoLong) {
      // 데이터 속성에 원본 메모 저장 → 클릭 시 모달
      var encoded = encodeURIComponent(memo);
      box += '<div onclick="window.showMemoModal(this)" data-memo="'+encoded+'" style="font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;max-height:130px;overflow:hidden;cursor:pointer;position:relative;">'+safeMemo+
        '<div style="position:absolute;bottom:0;left:0;right:0;height:46px;background:linear-gradient(to bottom,rgba(255,255,255,0) 0%,rgba(255,255,255,0.92) 60%,rgba(255,255,255,1) 100%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:12px;color:#2563eb;font-weight:700;pointer-events:none;">▼ 탭하여 전체보기</div>'+
        '</div>';
    } else {
      box += '<div style="font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;">'+safeMemo+'</div>';
    }
  } else {
    box += '<div style="font-size:13px;color:#aaa;padding:12px;text-align:center;">메모 없음 (동기화 시 자동 수집)</div>';
  }
  box += '</div>';

// 등록 사진 풀스크린 뷰어 — 좌우 스와이프/버튼으로 이동 (2026-06-04)
window.showPhotoViewer = function(urls, start){
  if(!urls || !urls.length) return;
  var i = Math.min(Math.max(start||0,0), urls.length-1);
  var v = document.createElement('div');
  v.id = 'photo-viewer';
  v.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:10002;display:flex;flex-direction:column;align-items:center;justify-content:center;';
  var imgEl = document.createElement('img');
  imgEl.style.cssText = 'max-width:96vw;max-height:80vh;object-fit:contain;border-radius:6px;user-select:none;-webkit-user-drag:none;';
  var counter = document.createElement('div');
  counter.style.cssText = 'position:absolute;top:16px;left:0;right:0;text-align:center;color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.6);';
  function render(){ imgEl.src = urls[i]; counter.textContent = (i+1)+' / '+urls.length; }
  function go(d){ i = (i + d + urls.length) % urls.length; render(); }
  var closeBtn = document.createElement('button');
  closeBtn.textContent = '✕';
  closeBtn.style.cssText = 'position:absolute;top:10px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;';
  closeBtn.onclick = function(){ v.remove(); document.removeEventListener('keydown', key); };
  function navBtn(txt, side, dir){ var b=document.createElement('button'); b.textContent=txt; b.style.cssText='position:absolute;'+side+':8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:24px;cursor:pointer;'; b.onclick=function(e){ e.stopPropagation(); go(dir); }; return b; }
  v.appendChild(imgEl); v.appendChild(counter); v.appendChild(closeBtn);
  if(urls.length>1){ v.appendChild(navBtn('‹','left',-1)); v.appendChild(navBtn('›','right',1)); }
  // 좌우 스와이프
  var sx=0, sw=false;
  v.addEventListener('touchstart', function(e){ sx=e.touches[0].clientX; sw=false; }, {passive:true});
  v.addEventListener('touchmove', function(e){ if(Math.abs(e.touches[0].clientX-sx)>10) sw=true; }, {passive:true});
  v.addEventListener('touchend', function(e){ if(!sw) return; var dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>45) go(dx<0?1:-1); });
  v.onclick = function(e){ if(e.target===v) { v.remove(); document.removeEventListener('keydown', key); } };
  function key(e){ if(e.key==='Escape'){ v.remove(); document.removeEventListener('keydown', key); } else if(e.key==='ArrowRight') go(1); else if(e.key==='ArrowLeft') go(-1); }
  document.addEventListener('keydown', key);
  render();
  document.body.appendChild(v);
};

<script>
/* =======================================================================
   🗺️ PWA 지도 모드 모듈 (4단계, additive — 기존 리스트 미수정)

   ======================================================================= */
(function(){
  var MAP=window.MAP={active:false,map:null,geocoder:null,overlays:[],detailItems:[],shown:0,selectedId:null,cache:{},debTimer:null,io:null,_lastRegion:"",_lastQs:"",_meOv:null};
  var CENTER={lat:37.6584,lng:126.8320}, INIT_LEVEL=8, PAGE=50;
  var API_MAP="https://diahouse.kr/api/map-listings-protected";

  function buildParams(extra){
    var p=new URLSearchParams();
    if(F.trade) p.set("trade_type",F.trade);
    if(F.types&&F.types.length) p.set("type_normalized",F.types.join(","));
    if(F.rl) p.set("region_large",F.rl);
    if(F.rm) p.set("region_mid",F.rm);
    if(F.rs) p.set("region_small",F.rs);
    if(F.pmin) p.set("price_min",F.pmin);
    if(F.pmax) p.set("price_max",F.pmax);
    if(F.amin) p.set("area_min",F.amin);
    if(F.amax) p.set("area_max",F.amax);

    if(F.baths){ p.set("bath_count_min",F.baths); if(F.bathMode!=="gte") p.set("bath_count_max",F.baths); }
    if(F.yearMax){ var cy=new Date().getFullYear(); p.set("approval_date_from",(cy-parseInt(F.yearMax))+"-01-01"); }
    if(F.facs&&F.facs.length) p.set("facilities",F.facs.join(","));
    if(F.search) p.set("search",F.search);
    if(extra){ for(var k in extra) p.set(k,extra[k]); }
    return p;
  }
  function shortMoney(v){ v=v||0; if(!v) return "-"; if(v>=10000){var u=Math.floor(v/10000),r=Math.round((v%10000)/1000); if(r>=10){u+=1;r=0;} return r>0?u+"억"+r+"천":u+"억";} return v.toLocaleString()+"만"; }
  function pinPrice(it){ if(it.trade_type==="월세") return "월 "+((it.monthly_rent||0).toLocaleString()); var v=it.trade_type==="전세"?(it.deposit||it.price||0):(it.price||0); return (it.trade_type==="전세"?"전세 ":"")+shortMoney(v); }
  function tradeColor(t){ return t==="매매"?"#FA5252":t==="전세"?"#228BE6":"#40C057"; }
  function clusterColor(c){ return c<=5?"#FFD43B":c<=20?"#FF922B":c<=50?"#FA5252":"#862E9C"; }
  function clusterSize(c){ return c<=5?40:c<=20?50:c<=50?60:70; }
  function _esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function memoHtml(m){ return _esc(m).replace(/(\d{2,3}[-.\s]?\d{3,4}[-.\s]?\d{4})/g,function(s){return '<a href="tel:'+s.replace(/[-.\s]/g,"")+'">'+s+'</a>';}); }
  var PLACEHOLDER="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" fill="#eef1f5"/><text x="40" y="48" font-size="26" text-anchor="middle" fill="#b6c0cc">🏠</text></svg>')));

  function fetchMap(mode,bbox,cb){
    var p=buildParams({mode:mode}); if(bbox) p.set("bbox",bbox);
    var key=p.toString(), c=MAP.cache[key];
    if(c&&(Date.now()-c.t)<60000){ cb(c.data); return; }

      if(r.status===401){ alert("로그인이 필요합니다"); location.href="login.html"; return Promise.reject("401"); }
      return r.json();

  function clearOverlays(){ MAP.overlays.forEach(function(o){o.setMap(null);}); MAP.overlays=[]; }

      if(cl.has_new){ var d=document.createElement("div"); d.className="cl-new-dot"; el.appendChild(d); }
      el.onclick=function(){ MAP.sheetClosed=false; var lv=MAP.map.getLevel(); MAP.map.setLevel(Math.max(3,lv-3),{anchor:new kakao.maps.LatLng(cl.latitude,cl.longitude)}); MAP.map.setCenter(new kakao.maps.LatLng(cl.latitude,cl.longitude)); };
      var ov=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(cl.latitude,cl.longitude),content:el,yAnchor:0.5,xAnchor:0.5}); ov.setMap(MAP.map); MAP.overlays.push(ov);
    });
  }
  function renderPins(items){
    clearOverlays();
    (items||[]).forEach(function(it){
      if(it.latitude==null) return;
      var w=document.createElement("div"); w.className="pin";
      var lab=document.createElement("div"); lab.className="pin-label"; lab.style.borderColor=tradeColor(it.trade_type); lab.style.color=tradeColor(it.trade_type); lab.textContent=pinPrice(it); w.appendChild(lab);
      if(it.is_new){ var nb=document.createElement("div"); nb.className="pin-new"; nb.textContent="NEW"; w.appendChild(nb); }
      w.onclick=function(){ MAP.selectCard(it.id,true); openSheet("peek"); };
      var ov=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(it.latitude,it.longitude),content:w,yAnchor:1,xAnchor:0.5}); ov.setMap(MAP.map); MAP.overlays.push(ov);
    });
  }

  function resetSheet(items,hint){

    var box=document.getElementById("sheetCards"); box.innerHTML="";
    if(!MAP.detailItems.length){ box.innerHTML='<div id="mapHint">'+(hint||"이 영역에 매물이 없습니다.<br>필터를 조정하거나 지도를 이동해보세요.")+'</div>'; return; }
    appendCards();
  }
  function appendCards(){
    var box=document.getElementById("sheetCards");
    MAP.detailItems.slice(MAP.shown,MAP.shown+PAGE).forEach(function(it){ box.appendChild(buildCard(it)); });
    MAP.shown+=Math.min(PAGE,MAP.detailItems.length-MAP.shown); lazyObserve();
  }
  function buildCard(it){
    var card=document.createElement("div"); card.className="mcard"; card.dataset.id=it.id;
    var tc=it.trade_type==="매매"?"b-sell":it.trade_type==="전세"?"b-jeon":"b-wol";
    var img=document.createElement("img"); img.className="mcard-img"; img.loading="lazy"; img.decoding="async";
    if(it.main_photo_url){ img.src=it.main_photo_url; img.onerror=function(){ this.onerror=null; this.src=PLACEHOLDER; }; }
    else { img.src=PLACEHOLDER; }
    var body=document.createElement("div"); body.className="mcard-body";
    var floorTxt=it.floor?(it.floor+"층"):"";
    body.innerHTML=
      '<div class="mcard-top"><span class="badge '+tc+'">'+(it.trade_type||"-")+'</span>'+(it.is_new?'<span class="mcard-new">NEW</span>':'')+'<span class="mcard-sub">'+(it.type_normalized||"")+'</span></div>'+
      '<div class="mcard-price">'+pinPrice(it)+'</div>'+
      '<div class="mcard-sub">'+(it.address_group||"")+'</div>'+
      '<div class="mcard-sub">'+((it.net_area?it.net_area+"m²":"")+(floorTxt?" · "+floorTxt:""))+'</div>'+
      '<div class="mcard-sub">'+(it.building_name||"")+'</div>'+
      '<div class="mcard-acts"><a class="mcard-act" href="javascript:void(0)" onclick="MAP.route('+it.id+')">🗺️ 길찾기</a><a class="mcard-act" href="javascript:void(0)" onclick="MAP._detail('+it.id+')">📄 상세</a></div>';
    card.appendChild(img); card.appendChild(body);
    card.onclick=function(e){ var tg=e.target; if(tg&&(tg.tagName==="A"||tg.closest&&tg.closest("a"))) return; MAP._detail(it.id); };
    return card;
  }
  MAP._detail=function(id){ var it=MAP.detailItems.filter(function(x){return String(x.id)===String(id);})[0]; if(it&&typeof showDetail==="function") showDetail(it); };
  function lazyObserve(){
    var imgs=document.querySelectorAll("#sheetCards img[data-src]");

  }
  MAP.selectCard=function(id,fromPin){

    if(!t&&fromPin){ while(MAP.shown<MAP.detailItems.length&&!t){ appendCards(); t=box.querySelector('.mcard[data-id="'+id+'"]'); } document.querySelectorAll("#sheetCards .mcard").forEach(function(c){ c.classList.toggle("active",String(c.dataset.id)===String(id)); }); }

  // 바텀시트 상태

  function refreshByView(){

    else { var b=MAP.map.getBounds(),sw=b.getSouthWest(),ne=b.getNorthEast(); var bbox=[sw.getLng(),sw.getLat(),ne.getLng(),ne.getLat()].join(","); fetchMap("detail",bbox,function(d){ renderPins(d.items); resetSheet(d.items||[]); if((d.items||[]).length && !MAP.sheetClosed) openSheet("peek"); }); }

  function onIdle(){ clearTimeout(MAP.debTimer); MAP.debTimer=setTimeout(refreshByView,500); }

  // 검색/지역 → 매물 좌표 bounds 자동 fit (작업 5 — Geocoder 행정구역 분류 폐기)
  function regionQuery(){ return [F.rl,F.rm,F.rs].filter(Boolean).join(" ").trim(); }
  function toast(msg){
    var t=document.createElement("div");
    t.textContent=msg;
    t.style.cssText="position:fixed;left:50%;bottom:20%;transform:translateX(-50%);background:rgba(20,24,40,.92);color:#fff;font-size:14px;font-weight:600;padding:11px 18px;border-radius:22px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);max-width:80%;text-align:center;";

  // 현재 필터(검색 포함) 매칭 매물 클러스터 좌표 수집 → bounds fit. 0/1/다수 분기.
  MAP.fitToResults=function(){

  function syncURL(){ if(!MAP.active||!MAP.map) return; var p=buildParams(),c=MAP.map.getCenter(); p.set("view","map"); p.set("lat",c.getLat().toFixed(6)); p.set("lng",c.getLng().toFixed(6)); p.set("zoom",MAP.map.getLevel()); if(MAP.selectedId) p.set("selected",MAP.selectedId); var qs="?"+p.toString(); MAP._lastQs=qs; try{ history.replaceState(null,"",qs); }catch(e){} }
  MAP.copyShareUrl=function(){ var url=location.origin+location.pathname+(MAP._lastQs||location.search); var b=document.querySelector(".share-btn"); var done=function(){ if(b){var t=b.textContent;b.textContent="✅ 복사됨";setTimeout(function(){b.textContent=t;},1500);} }; if(navigator.share){ navigator.share({title:"다이아부동산 매물",url:url}).then(done,function(){}); } else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(done,function(){prompt("URL 복사:",url);}); } else prompt("URL 복사:",url); };
  function restoreFilters(q){ try{ if(q.get("trade_type")) F.trade=q.get("trade_type"); if(q.get("type_normalized")) F.types=q.get("type_normalized").split(","); F.rl=q.get("region_large")||F.rl; F.rm=q.get("region_mid")||F.rm; F.rs=q.get("region_small")||F.rs; F.pmin=q.get("price_min")||""; F.pmax=q.get("price_max")||""; F.amin=q.get("area_min")||""; F.amax=q.get("area_max")||""; if(q.get("facilities")) F.facs=q.get("facilities").split(","); F.search=q.get("search")||""; try{ if(typeof buildAllPanels==="function") buildAllPanels(); }catch(e){} }catch(e){} }

  // GPS
  MAP.locate=function(){
    if(!navigator.geolocation){ alert("이 기기는 위치 기능을 지원하지 않습니다."); return; }
    var btn=document.getElementById("gpsBtn"); if(btn) btn.textContent="⏳";
    navigator.geolocation.getCurrentPosition(function(pos){
      if(btn) btn.textContent="📍";
      MAP._mePos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      var ll=new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude);
      if(MAP._meOv) MAP._meOv.setMap(null);
      var dot=document.createElement("div"); dot.style.cssText="width:18px;height:18px;border-radius:50%;background:#4285F4;border:3px solid #fff;box-shadow:0 0 0 4px rgba(66,133,244,.25);";
      MAP._meOv=new kakao.maps.CustomOverlay({position:ll,content:dot,yAnchor:0.5,xAnchor:0.5}); MAP._meOv.setMap(MAP.map);
      MAP.map.setLevel(5); MAP.map.setCenter(ll);
    }, function(err){
      if(btn) btn.textContent="📍";
      if(err && err.code===1){ alert("위치 권한이 거부되어 있습니다.\n\n• Android: 설정 > 앱 > 브라우저/PWA > 권한 > 위치 허용\n• iOS: 설정 > Safari > 위치 > 허용\n허용 후 다시 눌러주세요."); }
      else { alert("현재 위치를 가져오지 못했습니다. 잠시 후 다시 시도해주세요."); }
    }, {enableHighAccuracy:true,timeout:8000,maximumAge:30000});
  };
  // 길찾기 — 카카오맵 앱(kakaomap://) 우선, 미설치/실패 시 웹(map.kakao.com/link/to) 폴백
  MAP.route=function(id){
    var it=MAP.detailItems.filter(function(x){return String(x.id)===String(id);})[0]; if(!it||it.latitude==null) return;
    var name=encodeURIComponent(it.building_name||it.address_group||"매물");
    var web="https://map.kakao.com/link/to/"+name+","+it.latitude+","+it.longitude;
    var sp=MAP._mePos?(MAP._mePos.lat+","+MAP._mePos.lng):"";
    if(sp){ // sp 있으면 앱 경로안내 시도 → 1.2초 내 전환 없으면 웹 폴백
      var t=Date.now();
      setTimeout(function(){ if(Date.now()-t<1700) window.location.href=web; },1200);
      window.location.href="kakaomap://route?sp="+sp+"&ep="+it.latitude+","+it.longitude+"&by=CAR";
    } else { window.open(web,"_blank","noopener"); }  // 현재위치 없으면 웹(도착지) — 카카오가 현위치로 경로
  };
  // 카드 좌우 스와이프 → 다음/이전 매물
  MAP.navCard=function(dir){
    if(!MAP.detailItems.length) return;
    var ids=MAP.detailItems.map(function(x){return String(x.id);});
    var cur=ids.indexOf(String(MAP.selectedId)); if(cur<0) cur=dir>0?-1:0;
    var ni=cur+dir; if(ni<0) ni=0; if(ni>=ids.length) ni=ids.length-1;
    var it=MAP.detailItems[ni];
    MAP.selectCard(it.id,true);
    if(it.latitude!=null) MAP.map.setCenter(new kakao.maps.LatLng(it.latitude,it.longitude));  // 핀 강조(중심 이동)
  };
  // 바텀시트 드래그 + 카드 스와이프 제스처
  function setupGestures(){
    var sheet=document.getElementById("sheet"), handle=document.getElementById("sheetHandle"), cards=document.getElementById("sheetCards");
    var H=function(){ return window.innerHeight; };
    var PEEK=function(){ return H()*0.66; }, EXP=function(){ return H()*0.08; }, CLOSED=function(){ return H(); };
    // ----- 시트 드래그 -----
    var dragging=false, startY=0, baseT=0, lastY=0, lastT=0, vel=0;
    function baseTranslate(){ if(sheet.classList.contains("expanded")) return EXP(); if(sheet.classList.contains("peek")) return PEEK(); return CLOSED(); }
    function setT(px){ sheet.style.transition="none"; sheet.style.transform="translateY("+px+"px)"; }
    function snap(px){
      sheet.style.transition=""; sheet.style.transform=""; sheet.classList.remove("peek","expanded");
      if(vel>0.7 || px>H()*0.82){ MAP.sheetClosed=true; /* 닫기 */ }
      else if(vel<-0.7 || px<H()*0.4){ sheet.classList.add("expanded"); MAP.sheetClosed=false; }
      else { sheet.classList.add("peek"); MAP.sheetClosed=false; }
    }
    function dStart(e){ var t=e.touches?e.touches[0]:e; dragging=true; startY=t.clientY; baseT=baseTranslate(); lastY=t.clientY; lastT=Date.now(); vel=0; }
    function dMove(e){ if(!dragging) return; var t=e.touches?e.touches[0]:e; var px=Math.max(EXP(), Math.min(CLOSED(), baseT+(t.clientY-startY))); setT(px); var now=Date.now(); if(now>lastT){ vel=(t.clientY-lastY)/(now-lastT); lastY=t.clientY; lastT=now; } if(e.cancelable) e.preventDefault(); }
    function dEnd(){ if(!dragging) return; dragging=false; var m=getComputedStyle(sheet).transform, px=PEEK(); if(m&&m!=="none"){ var p=m.split(","); px=parseFloat(p[p.length-1])||px; } snap(px); }
    handle.addEventListener("touchstart",dStart,{passive:true});
    handle.addEventListener("touchmove",dMove,{passive:false});
    handle.addEventListener("touchend",dEnd);
    handle.addEventListener("mousedown",function(e){ dStart(e); var mm=function(ev){dMove(ev);}, mu=function(){dEnd();document.removeEventListener("mousemove",mm);document.removeEventListener("mouseup",mu);}; document.addEventListener("mousemove",mm); document.addEventListener("mouseup",mu); });
    // ----- 카드 좌우 스와이프 -----
    var sx=0, sy=0, st=0, swipe=false;
    cards.addEventListener("touchstart",function(e){ var t=e.touches[0]; sx=t.clientX; sy=t.clientY; st=Date.now(); swipe=false; },{passive:true});
    cards.addEventListener("touchmove",function(e){ var t=e.touches[0]; if(Math.abs(t.clientX-sx)>Math.abs(t.clientY-sy)&&Math.abs(t.clientX-sx)>12) swipe=true; },{passive:true});
    cards.addEventListener("touchend",function(e){ if(!swipe) return; var t=e.changedTouches[0]; var dx=t.clientX-sx, dt=Date.now()-st; var fast=Math.abs(dx)/(dt||1)>0.5; if(Math.abs(dx)>50||fast) MAP.navCard(dx<0?1:-1); });
  }

  // 초기화
  function initMap(restore){
    if(MAP.inited) return;
    if(typeof kakao==="undefined"||!kakao.maps){ document.getElementById("mapCanvas").innerHTML='<div style="padding:40px;text-align:center;color:#e74c3c;">카카오 지도 로드 실패 — 도메인 등록 확인</div>'; return; }
    kakao.maps.load(function(){
      var lat=(restore&&restore.lat)||CENTER.lat,lng=(restore&&restore.lng)||CENTER.lng,lv=(restore&&restore.zoom)||INIT_LEVEL;
      MAP.map=new kakao.maps.Map(document.getElementById("mapCanvas"),{center:new kakao.maps.LatLng(lat,lng),level:parseInt(lv)||INIT_LEVEL});
      MAP.inited=true;
      try{ MAP.geocoder=(kakao.maps.services&&new kakao.maps.services.Geocoder())||null; }catch(e){ MAP.geocoder=null; }
      kakao.maps.event.addListener(MAP.map,"idle",onIdle);
      setupGestures();
      var cards=document.getElementById("sheetCards");
      cards.addEventListener("scroll",function(){ if(cards.scrollTop+cards.clientHeight>=cards.scrollHeight-100&&MAP.shown<MAP.detailItems.length) appendCards(); });
      MAP._lastRegion=regionQuery(); MAP._lastSearch=F.search||"";
      if(restore&&restore.lat){ refreshByView(); } else if(regionQuery()||F.search){ MAP.fitToResults(); } else { refreshByView(); }
    });
  }

  // 토글 (코너버튼 제거 — list 는 ?view=list 디버그용)
  MAP.switch=function(view){
    var toMap=(view==="map"); MAP.active=toMap;
    document.getElementById("mapWrap").classList.toggle("on",toMap);
    var listEls=[document.getElementById("welcomeState"),document.getElementById("resultBar"),document.querySelector(".table-wrap"),document.getElementById("pagination"),document.getElementById("loadingBar")];
    listEls.forEach(function(el){ if(!el) return; if(toMap){ if(el._sd===undefined) el._sd=el.style.display; el.style.display="none"; } else { el.style.display=(el._sd!==undefined?el._sd:""); el._sd=undefined; } });
    if(toMap){ try{ searched=true; }catch(e){} MAP.sheetClosed=false; if(!MAP.inited) initMap(MAP._restore); else { MAP.map.relayout(); if(_needsFit()) MAP.fitToResults(); else refreshByView(); } syncURL(); }
    else { closeSheet(); try{ history.replaceState(null,"","?view=list"); }catch(e){} }
  };
  MAP.refresh=function(){ MAP.cache={}; if(!(MAP.active&&MAP.inited)) return; if(_needsFit()) MAP.fitToResults(); else refreshByView(); };

  // doSearch 래핑 (맵 모드면 맵 갱신)
  var _origDoSearch=window.doSearch;
  window.doSearch=function(page){ if(MAP.active){ MAP.refresh(); } else { _origDoSearch(page); } };

  // 로드 시 — 진입 시 항상 지도 고정 (localStorage 무시). ?view=list 는 디버그용 리스트.
  window.addEventListener("DOMContentLoaded",function(){
    var q=new URLSearchParams(location.search);
    if(q.get("view")==="list") return;   // 디버그: 리스트 모드 유지
    if(q.get("lat")||q.get("search")){ restoreFilters(q); MAP._restore={lat:parseFloat(q.get("lat")),lng:parseFloat(q.get("lng")),zoom:q.get("zoom")}; MAP.selectedId=q.get("selected")||null; }
    setTimeout(function(){ MAP.switch("map"); },60);
  });
})();
</script>
</body>
